[tools]
hk = "latest"
rust = "nightly"
hyperfine = "latest"
"cargo:cargo-nextest" = "latest"

tombi = "latest"
yq = "latest"

actionlint = "latest"
shellcheck = "latest"

[env]
HK_MISE = 1

[hooks]
postinstall = "hk install --mise"

[tasks."build:rust"]
description = "Build release commit-lint"
run = "cargo build --release -p atypical-commit"

[tasks."test:rust"]
description = "Test Rust workspace"
run = "cargo nextest run --workspace"

[tasks."bench:latency"]
description = "Per-invocation latency receipts for commit-lint"
run = "sh benches/latency.sh"
